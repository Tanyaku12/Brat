<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brat generator — by blinx</title>
    <meta name="description" content="Buat gambar bergaya brat album Charli XCX dengan teks kamu sendiri.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">

        <!-- LEFT PANEL -->
        <aside class="panel-left">
            <div class="brand">
                <h1 class="title">brat<span class="dot">.</span></h1>
                <span class="badge">generator</span>
            </div>

            <div class="input-group">
                <label for="inputText">pesan kamu</label>
                <input type="text" id="inputText" placeholder="ketik sesuatu..." autocomplete="off" spellcheck="false">
            </div>

            <div class="option-group">
                <label>background</label>
                <div class="color-presets">
                    <button class="color-btn active" data-color="#8ACE00" style="background:#8ACE00" title="brat green"></button>
                    <button class="color-btn" data-color="#ffffff" style="background:#ffffff" title="white"></button>
                    <button class="color-btn" data-color="#ff90e8" style="background:#ff90e8" title="pink"></button>
                    <button class="color-btn" data-color="#000000" style="background:#000000" title="black"></button>
                    <button class="color-btn" data-color="#ff4444" style="background:#ff4444" title="red"></button>
                    <button class="color-btn custom-color-btn" title="custom">
                        <input type="color" id="bgColor" value="#8ACE00">
                        🎨
                    </button>
                </div>
            </div>

            <div class="option-group">
                <label for="blurToggle">blur effect</label>
                <label class="toggle">
                    <input type="checkbox" id="blurToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <button id="generateBtn">
                <span class="btn-icon">✦</span> generate
            </button>

            <p class="note">tip: <code>?text=pesan</code> di URL</p>

            <footer class="footer">© blinx 2025</footer>
        </aside>

        <!-- RIGHT PANEL -->
        <main class="panel-right">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="canvas-placeholder" id="canvasPlaceholder">
                    <span>✦</span>
                    <p>hasil muncul di sini</p>
                </div>
                <canvas id="bratCanvas"></canvas>
            </div>

            <div class="action-btns" id="actionBtns">
                <button id="downloadBtn" class="btn-secondary">↓ download</button>
                <button id="copyLinkBtn" class="btn-secondary">⛓ copy link</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
